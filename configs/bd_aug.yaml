# Model: Block Diffusion decoder + Misalignment Augmentation.
# Fine-tuned from bd_clean checkpoint with augmented data.
model_name: bd_aug
decoder_type: bd

model:
    mbart_name: facebook/mbart-large-cc25
    input_modality: rgb
    embed_dim: 1024
    hidden_size: 1024
    temporal_kernel: 3
    rgb_backbone: resnet18

block_diffusion:
    block_size: 4
    diffusion_steps: 128
    sampling_eps_min: 1.0e-03
    sampling_eps_max: 1.0
    antithetic_sampling: true
    ignore_bos: true
    temperature: 0.0
    remasking: low_confidence
    steps_per_block: null

training:
    epochs: 200
    batch_size: 16
    num_workers: 4
    optimizer: SGD
    momentum: 0.9
    resume_from: results/checkpoints/bd_clean/best_checkpoint.pth
    learning_rate:
        default: 0.01
    weight_decay: 0.0
    label_smoothing: 0.2

    t_max: 200
    eta_min: 1.0e-08

    save_every_n_epochs: 10
    early_stopping_patience: 10
    eval_every_n_epochs: 2
    ema: 0.9999

augmentation:
    enabled: true
    p_aug: 0.5
    min_severity: 0.05
    knee_thresholds:
        HT: 0.25
        TT: 0.40
        HC: 0.30
        TC: 0.30

validation:
    translation:
        max_length: 100
        diffusion_steps: 128
        length_penalty: 1.0
