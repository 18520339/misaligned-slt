# Model A: AR decoder (MSKA-SLT) + Misalignment Augmentation
# Fine-tune from pretrained MSKA-SLT checkpoint with augmented data
model_name: ar_aug
decoder_type: ar # autoregressive (original MSKA TranslationNetwork)

# Inherit base training params from MSKA
training:
    epochs: 80
    batch_size: 16
    train_from_scratch: false # set true to train without pretrained MSKA weights
    optimizer: Adam
    learning_rate:
        default: 1.0e-05
        vl_mapper: 5.0e-04
        translation_network: 5.0e-05 # Slightly higher LR for translation to adapt faster
    weight_decay: 0.001
    betas: [0.9, 0.998]
    scheduler: cosineannealing
    t_max: 80
    gradient_clip_norm: 1.0

    # Checkpointing
    save_every_n_epochs: 5
    early_stopping_patience: 5

    # Loss weights (match MSKA default)
    recognition_weight: 1.0
    translation_weight: 1.0

    # Evaluation frequency (not every epoch, which is slow)
    eval_every_n_epochs: 2

# Augmentation
augmentation:
    enabled: true
    p_aug: 0.5 # probability of applying misalignment per sample
    min_severity: 0.05
    knee_thresholds: # Per-condition knee thresholds from Phase 1 (max_severity for sampling)
        HT: 0.25
        TT: 0.40
        HC: 0.30
        TC: 0.30

# Validation
validation:
    recognition:
        beam_size: 1
    translation:
        length_penalty: 1
        max_length: 100
        num_beams: 5
