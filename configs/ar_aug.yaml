# Model: AR decoder (mBART) + Misalignment Augmentation
# Fine-tuned from ar_clean with augmented data.
model_name: ar_aug
decoder_type: ar

model:
    mbart_name: facebook/mbart-large-cc25
    input_modality: rgb
    embed_dim: 1024
    hidden_size: 1024
    temporal_kernel: 3
    rgb_backbone: resnet18

# Shares VLP checkpoint with ar_clean.
vlp_checkpoint: results/checkpoints/ar_clean/vlp_checkpoint.pth

training:
    epochs: 200
    batch_size: 16
    num_workers: 4
    optimizer: SGD
    momentum: 0.9
    pretrained_checkpoint: results/checkpoints/ar_clean/best_checkpoint.pth
    learning_rate:
        default: 0.01
    weight_decay: 0.0
    label_smoothing: 0.2

    t_max: 200
    eta_min: 1.0e-08

    save_every_n_epochs: 10
    early_stopping_patience: 10
    eval_every_n_epochs: 2

augmentation:
    enabled: true
    p_aug: 0.5
    min_severity: 0.05
    knee_thresholds:
        HT: 0.25
        TT: 0.40
        HC: 0.30
        TC: 0.30

validation:
    translation:
        max_new_tokens: 150
        num_beams: 4
        length_penalty: 1.0
