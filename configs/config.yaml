task: S2T
device: cuda
seed: 42

paths:
    results_dir: results
    checkpoint: null       # pretrained Stage 2 checkpoint for Phase 1 analysis
    vlp_checkpoint: null   # pretrained VLP checkpoint for Phase 1 analysis

# Dataset-specific values loaded from configs/datasets/<dataset_name>.yaml.
data:
    dataset_name: phoenix2014t
    config_path: configs/datasets/phoenix2014t.yaml

model:
    mbart_name: facebook/mbart-large-cc25
    input_modality: rgb        # overridable via dataset/model config
    embed_dim: 1024
    hidden_size: 1024
    temporal_kernel: 3
    temporal_conv_type: 2
    num_keypoints: 77
    input_channels: 3
    rgb_backbone: resnet18
    scale_embedding: false

misalignment:
    min_frames: 4              # CoSign + TemporalConv1D conv_type=2 ~4x downsampling
    max_input_length: 300      # max frames per video (matches original GFSLT-VLP)

    knee_point:
        severity_levels: [0.05, 0.10, 0.15, 0.20, 0.25, 0.30, 0.35, 0.40, 0.45, 0.50]
        split: dev

    benchmark:
        severity_levels: [0.05, 0.10, 0.20]
        split: test

    train_eval:
        severity_levels: [0.05, 0.10, 0.15, 0.20, 0.25, 0.30, 0.35, 0.40, 0.45, 0.50]
        split: train
        subsample_size: 1000

evaluation:
    batch_size: 64
    num_workers: 4
    translation:
        max_new_tokens: 150    # paper default
        num_beams: 4           # paper default
        length_penalty: 1.0

# Expected clean baseline for Phoenix-2014T test set (paper: RGB + AR + VLP).
expected_clean:
    bleu4: 22.0
    rouge_l: 48.0
    tolerance: 3.0
