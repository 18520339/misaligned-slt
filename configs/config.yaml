task: S2T
device: cuda
seed: 42

# MSKA paths (relative to project root)
paths:
    mska_root: MSKA
    mska_config: MSKA/configs/phoenix-2014t_s2t.yaml
    checkpoint: MSKA/pretrained_models/phoenix-2014T_slt.pth
    results_dir: results

# Dataset
data:
    dataset_name: Phoenix-2014T
    train_label_path: MSKA/data/Phoenix-2014T/Phoenix-2014T.train
    dev_label_path: MSKA/data/Phoenix-2014T/Phoenix-2014T.dev
    test_label_path: MSKA/data/Phoenix-2014T/Phoenix-2014T.test

# Misalignment parameters
misalignment:
    # MSKA's get_selected_index rounds T to the nearest multiple of 4.
    # Two stride-2 stages then give T_enc = ⌊(⌊(T-1)/2⌋+1)/2⌋.
    # For any T ∈ [1,7]: valid_len ≤ 4 → T_enc = 1 (degenerate — full sentence
    # collapses to one feature vector, temporal attention carries no information).
    # For T = 8: valid_len = 8 → T_enc = 2 (minimum non-degenerate state).
    # Samples with T_remaining < 8 after truncation are excluded from evaluation.
    min_frames: 8
    max_input_length: 400 # MSKA clip_len

    knee_point:
        severity_levels: [0.05, 0.10, 0.15, 0.20, 0.25, 0.30, 0.35, 0.40, 0.45, 0.50]
        split: dev

    benchmark:
        severity_levels: [0.05, 0.10, 0.20]
        split: test

    train_eval:
        severity_levels: [0.05, 0.10, 0.15, 0.20, 0.25, 0.30, 0.35, 0.40, 0.45, 0.50]
        split: train
        subsample_size: 1000

# Evaluation
evaluation:
    batch_size: 8
    num_workers: 4
    beam_size: 5
    translation:
        length_penalty: 1
        max_length: 100
        num_beams: 5

# Expected clean baseline (from MSKA paper - Phoenix-2014T)
expected_clean:
    wer: 19.8
    bleu4: 29.03
    rouge_l: 53.54
    tolerance: 2.0 # acceptable deviation from reported numbers
