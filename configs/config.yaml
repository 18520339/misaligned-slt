task: S2T
device: cuda
seed: 42

paths: # MSKA paths (relative to project root)
    mska_root: MSKA
    mska_config: MSKA/configs/phoenix-2014t_s2t.yaml
    checkpoint: MSKA/pretrained_models/phoenix-2014T_slt.pth
    results_dir: results

data:
    dataset_name: Phoenix-2014T
    train_label_path: MSKA/data/Phoenix-2014T/Phoenix-2014T.train
    dev_label_path: MSKA/data/Phoenix-2014T/Phoenix-2014T.dev
    test_label_path: MSKA/data/Phoenix-2014T/Phoenix-2014T.test

misalignment:
    min_frames: 8
    max_input_length: 400 # MSKA clip_len

    knee_point:
        severity_levels: [0.05, 0.10, 0.15, 0.20, 0.25, 0.30, 0.35, 0.40, 0.45, 0.50]
        split: dev

    benchmark:
        severity_levels: [0.05, 0.10, 0.20]
        split: test

    train_eval:
        severity_levels: [0.05, 0.10, 0.15, 0.20, 0.25, 0.30, 0.35, 0.40, 0.45, 0.50]
        split: train
        subsample_size: 1000

evaluation:
    batch_size: 128
    num_workers: 4
    beam_size: 5
    translation:
        length_penalty: 1
        max_length: 100
        num_beams: 5

expected_clean: # Expected clean baseline (from MSKA paper - Phoenix-2014T)
    wer: 19.8
    bleu4: 29.03
    rouge_l: 53.54
    tolerance: 2.0 # acceptable deviation from reported numbers
