# Model B: Block Diffusion decoder + Clean training only
# Stage 1 of BD training — teaches basic vision-to-language mapping
model_name: bd_clean
decoder_type: bd # block diffusion

# Block diffusion hyperparameters
block_diffusion:
    block_size: 4 # tokens per block (ablate with 8, 16)
    diffusion_steps: 5000 # denoising steps per block at inference
    n_heads: 16
    n_layers: 6
    cond_dim: 128
    mlp_ratio: 4
    dropout: 0.1
    max_seq_len: 128
    noise_type: loglinear
    parameterization: subs # substitution (absorbing state)
    sampling_eps_min: 1.0e-03
    sampling_eps_max: 1.0
    nucleus_p: 1.0 # no top-p filtering
    antithetic_sampling: true

training:
    epochs: 80 # diffusion needs more epochs
    batch_size: 32
    train_from_scratch: true # set true to train without pretrained MSKA weights
    optimizer: AdamW
    learning_rate:
        default: 5.0e-05
        recognition_network: 2.0e-05
        vl_mapper: 1.0e-03
    weight_decay: 0.001
    betas: [0.9, 0.998]
    scheduler: cosineannealing
    t_max: 80
    gradient_clip_norm: 1.0

    save_every_n_epochs: 5
    early_stopping_patience: 5

    recognition_weight: 1.0
    translation_weight: 1.0
    eval_every_n_epochs: 2 # Evaluation frequency

augmentation:
    enabled: false
    p_aug: 0.0

validation:
    recognition:
        beam_size: 1
    translation:
        length_penalty: 1
        max_length: 100
        num_beams: 5 # not used for BD, kept for consistency
